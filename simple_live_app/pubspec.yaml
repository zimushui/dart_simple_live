name: simple_live_app
version: 1.8.6+10806
publish_to: none
description: "Simple Live APP"
environment:
  sdk: '>=3.0.5 <4.0.0'

dependencies:
  simple_live_core:
    path: ../simple_live_core
  # 图标
  cupertino_icons: ^1.0.8
  remixicon: ^1.2.0

  # 框架、工具
  get: ^4.6.6
  dio: ^5.7.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  logger: ^2.4.0
  intl: ^0.20.2
  qr_flutter: ^4.1.0
  dynamic_color: ^1.7.0
  path: ^1.9.0
  udp: ^5.0.3 # 修复：降级到可用版本
  uuid: ^4.5.0
  webdav_client: ^1.2.2
  archive: ^3.6.1

  # Widget
  flutter_staggered_grid_view: ^0.7.0
  flutter_easyrefresh: ^2.2.2
  extended_image: ^9.1.0
  flutter_smart_dialog: ^4.9.7+7
  sticky_headers: ^0.3.0+2
  lottie: ^3.1.2
  ns_danmaku:
    git:
      url: https://github.com/xiaoyaocz/flutter_ns_danmaku.git
      tag: v0.0.9

  # 系统交互
  package_info_plus: ^8.3.0
  device_info_plus: ^10.1.0
  url_launcher: ^6.3.1
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  cross_file: ^0.3.4+2
  permission_handler: ^11.3.1
  image_gallery_saver: ^2.0.3
  screen_brightness: ^2.1.2
  wakelock_plus: ^1.2.11
  file_picker: ^8.1.2
  window_manager: ^0.4.3
  floating: ^6.0.0
  flutter_inappwebview: ^6.1.5
  connectivity_plus: ^6.1.3
  qr_code_scanner: ^1.0.1
  volume_controller: ^2.0.7

  # 网络相关
  shelf: ^1.4.1
  shelf_router: ^1.1.4
  network_info_plus: ^6.1.3
  signalr_netcore: ^1.3.9

  # 视频播放
  media_kit: ^1.1.11
  media_kit_video: ^1.2.5
  media_kit_libs_video: ^1.0.5

  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

dependency_overrides:
  screen_brightness: ^2.1.2

dev_dependencies:
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21
  macos:
    generate: true

flutter:
  uses-material-design: true
  assets:
    - assets/statement.txt
    - assets/images/
    - assets/icons/
    - assets/lotties/
